services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Porta de mídia WebRTC (VoIP) necessária para o fluxo de áudio (UDP + TCP Mux)
      - "${KALLIA_UDP_PORT:-50000}:${KALLIA_UDP_PORT:-50000}/udp"
      - "${KALLIA_UDP_PORT:-50000}:${KALLIA_UDP_PORT:-50000}/tcp"
    environment:
      - KALLIA_PG_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@database:5432/${POSTGRES_DB:-postgres}?sslmode=disable
      - KALLIA_PG_NAMESPACE=${KALLIA_PG_NAMESPACE:-kallia}
      - KALLIA_ADMIN_EMAIL=${KALLIA_ADMIN_EMAIL:-admin@kallia.com}
      - KALLIA_ADMIN_PASSWORD=${KALLIA_ADMIN_PASSWORD:-123456}
      - KALLIA_INITIAL_PROJECT_NAME=${KALLIA_INITIAL_PROJECT_NAME:-Projeto Principal}
      - KALLIA_INITIAL_PROJECT_PLAN=${KALLIA_INITIAL_PROJECT_PLAN:-expert}
      - KALLIA_MAX_CALLS=${KALLIA_MAX_CALLS:-8}
      - KALLIA_PUBLIC_IP=${KALLIA_PUBLIC_IP:-auto}
      - KALLIA_UDP_PORT=${KALLIA_UDP_PORT:-50000}
      - KALLIA_API_KEY=${KALLIA_API_KEY}
    volumes:
      - ./storage:/app/storage
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
